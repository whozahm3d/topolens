# Topolens — Global Configuration
# Training/eval hyperparameters, dataset manifest, and project metadata.
# NOTE: config.py (not this file) is the source of truth for values that
# drive actual dataset generation/rendering (NODE_TIERS, GENERATORS, paths,
# IMAGE_SIZE/DPI, RANDOM_SEED) — those are duplicated here for documentation
# purposes only and must be kept in sync by hand. Fields under model:,
# evaluation:, and render.node_size ARE read directly by scripts (see
# load_yaml_config() in topolens_utils.py).

project:
  name: "Topolens"
  seed: 42

dataset:
  synthetic:
    total_graphs: 2500
    node_range: [5, 100]   # must match config.py's NODE_TIERS (tiny→large caps at 100).
                            # This field is documentation only — no script reads it;
                            # actual generation uses config.py's NODE_TIERS dict.
    generators:
      erdos_renyi:
        count: 500
        params:
          p: [0.05, 0.1, 0.2, 0.3]
      barabasi_albert:
        count: 500
        params:
          m: [1, 2, 3, 5]
      watts_strogatz:
        count: 500
        params:
          k: [4, 6]
          p: [0.1, 0.3]
      random_tree:
        count: 500
        params: {}
      dense:
        count: 500
        node_range: [5, 100]
        params:
          p: [0.6, 0.8, 0.95]

  split:
    train: 0.70
    val: 0.15
    test: 0.15
    stratify_by: "generator_type"

  real_world:
    source: "TUDataset"
    datasets: ["MUTAG", "PROTEINS"]
    root_dir: "data/raw"
    usage: "held_out_generalization_test"  # never used in training

render:
  layout_algorithm: "graphviz_sfdp"   # Graphviz sfdp is the intended render backend for Phase 2
  image_size: [224, 224]              # matches common CNN input size
  format: "png"
  dpi: 100
  node_size: 50
  edge_width: 1.0
  background_color: "white"

model:
  cnn:
    architecture: "custom_cnn"        # or "resnet18_finetune"
    input_size: [224, 224]
    outputs: ["num_vertices", "num_edges"]
    batch_size: 32
    epochs: 30
    learning_rate: 0.001
    optimizer: "adam"
    loss: "mse"

  baseline:
    type: "gcn"                       # or "graph_statistic_heuristic"
    layers: 3
    hidden_dim: 64
    epochs: 30

evaluation:
  metrics: ["mae", "rmse"]
  breakdown_by: ["generator_type", "density_bucket"]

paths:
  data_processed: "data/processed/labels_processed.csv"
  data_splits: "data/splits/"
  data_images: "data/images/"
  checkpoints: "models/checkpoints/"
  results: "evaluation/results/"
  report_figures: "report/figures/"
